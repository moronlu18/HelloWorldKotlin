name: Sync README to Wiki

on:
  push:
    branches: ["main"]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate wiki pages
        run: |
          mkdir -p wiki-content
          mkdir -p wiki-content/img
          
          cp README.md wiki-content/Home.md
          
          if [ -d "img" ]; then
            cp -r img/* wiki-content/img/ 2>/dev/null || true
          fi
          
          # Generate _Sidebar.md with headings only
          echo "Home" > wiki-content/_Sidebar.md
          grep -E "^#{1,2} " README.md | sed 's/^#* *//' >> wiki-content/_Sidebar.md

      - name: Push to Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -z "$WIKI_TOKEN" ]; then
            echo "Error: WIKI_TOKEN secret not configured"
            exit 1
          fi
          
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          
          git clone "$WIKI_URL" wiki-repo
          cp -r wiki-content/* wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: update wiki from README"
          git push
