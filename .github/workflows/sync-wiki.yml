name: Sync README to Wiki

on:
  push:
    branches: ["main"]
    paths:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync to Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        run: |
          if [ -z "$WIKI_TOKEN" ]; then
            echo "Error: WIKI_TOKEN secret not configured"
            echo "Create a PAT with 'repo' scope and add it as WIKI_TOKEN secret"
            exit 1
          fi
          
          WIKI_URL="https://x-access-token:${WIKI_TOKEN}@github.com/${{ github.repository }}.wiki.git"
          
          git clone "$WIKI_URL" wiki-repo
          cp README.md wiki-repo/Home.md
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "docs: update wiki from README"
          git push
